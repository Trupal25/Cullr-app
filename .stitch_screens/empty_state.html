<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=Geist+Mono:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#103633",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#313635",
                        "on-tertiary-fixed-variant": "#294d4a",
                        "inverse-surface": "#e0e3e2",
                        "on-primary-container": "#00544d",
                        "on-background": "#e0e3e2",
                        "secondary": "#a8cecb",
                        "on-error": "#690005",
                        "primary-fixed": "#70f8e7",
                        "secondary-fixed": "#c4eae7",
                        "surface-dim": "#101414",
                        "primary-container": "#3ecfbf",
                        "on-surface-variant": "#bbcac6",
                        "on-tertiary-container": "#2c514d",
                        "inverse-on-surface": "#2d3131",
                        "surface-tint": "#4edbcb",
                        "surface-container-lowest": "#0b0f0f",
                        "on-surface": "#e0e3e2",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#a8cec9",
                        "on-primary-fixed": "#00201d",
                        "primary-fixed-dim": "#4edbcb",
                        "outline": "#859490",
                        "background": "#101414",
                        "tertiary-container": "#9cc2be",
                        "on-primary-fixed-variant": "#005049",
                        "secondary-fixed-dim": "#a8cecb",
                        "on-secondary-fixed-variant": "#294d4b",
                        "surface-container": "#1c2020",
                        "surface-container-low": "#181c1c",
                        "on-primary": "#003732",
                        "surface": "#101414",
                        "surface-bright": "#363a3a",
                        "on-secondary-fixed": "#00201f",
                        "on-secondary-container": "#97bcba",
                        "tertiary-fixed": "#c3eae5",
                        "on-secondary": "#103635",
                        "outline-variant": "#3c4947",
                        "error": "#ffb4ab",
                        "surface-container-high": "#272b2b",
                        "primary": "#62ecdb",
                        "tertiary": "#b7ded9",
                        "on-tertiary-fixed": "#00201e",
                        "secondary-container": "#294d4b",
                        "surface-container-highest": "#313635",
                        "inverse-primary": "#006a61"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"],
                        "mono": ["Geist Mono"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #080C0C; /* Specific brand empty state background */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .geist-mono {
            font-family: 'Geist Mono', monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen flex flex-col font-body selection:bg-primary/30">
<!-- TopAppBar -->
<nav class="flex items-center justify-between px-6 h-16 w-full bg-[#101414] dark:bg-[#101414] border-b border-[#313635]/30 fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-[#62ecdb] active:scale-95 duration-100 p-2">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="font-['Space_Grotesk'] lowercase tracking-tighter text-xl text-[#62ecdb]">cullr</span>
</div>
<div class="flex items-center gap-2">
<button class="text-[#62ecdb] active:scale-95 duration-100 p-2">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</div>
</nav>
<!-- Main Canvas (Centered Content) -->
<main class="flex-grow flex items-center justify-center px-8">
<div class="max-w-md w-full text-center space-y-12">
<!-- Atmospheric Graphic Placeholder -->
<div class="relative flex justify-center items-center">
<!-- Abstract Glow -->
<div aria-hidden="true" class="absolute w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
<!-- Large "0" Counter -->
<div class="relative">
<span class="geist-mono text-[160px] leading-none font-bold text-primary-container tracking-tighter opacity-80">0</span>
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-12 h-0.5 bg-outline-variant opacity-30"></div>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-4">
<h2 class="text-3xl font-headline font-medium text-[#EFF6F5] tracking-tight">Nothing to cull.</h2>
<p class="text-[#6B8F8D] text-lg max-w-xs mx-auto leading-relaxed">
                    Your gallery looks clean. No spam or junk detected.
                </p>
</div>
<!-- Action Cluster -->
<div class="pt-8">
<button class="inline-flex items-center gap-3 px-8 py-3 rounded-lg border border-outline-variant/30 text-[#6B8F8D] hover:text-primary hover:border-primary/50 transition-all duration-300 group">
<span class="material-symbols-outlined text-lg group-hover:rotate-180 transition-transform duration-500" data-icon="refresh">refresh</span>
<span class="font-mono text-[11px] uppercase tracking-[0.2em] font-medium">Scan Again</span>
</button>
</div>
</div>
</main>
<!-- Bottom Status Bar (Surgical Utility) -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 md:bottom-8 w-auto px-4 py-1.5 bg-surface-container-highest/40 backdrop-blur-md rounded-full border border-outline-variant/10 flex items-center gap-4">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-mono text-[9px] uppercase tracking-widest text-on-secondary-container">System Idle</span>
</div>
<div class="h-3 w-px bg-outline-variant/30"></div>
<span class="font-mono text-[9px] uppercase tracking-widest text-outline">v2.0.4-stable</span>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#101414]/70 backdrop-blur-xl border-t border-[#313635]/20 md:hidden">
<!-- Active Tab: Grid View (Logic: Search/Gallery Home) -->
<button class="text-[#62ecdb] bg-[#3ecfbf]/10 rounded-full p-3 active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<button class="text-[#97bcba] p-3 hover:bg-[#1c2020] rounded-full active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
</button>
<button class="text-[#97bcba] p-3 hover:bg-[#1c2020] rounded-full active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</button>
<button class="text-[#97bcba] p-3 hover:bg-[#1c2020] rounded-full active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
<!-- Decorative Corner Accents (Surgical Aesthetic) -->
<div class="fixed top-20 right-8 opacity-20 pointer-events-none hidden lg:block">
<div class="font-mono text-[10px] text-outline-variant text-right uppercase tracking-[0.3em] space-y-1">
<p>Storage Optimization</p>
<p>Scanning Module active</p>
<p>User_ID: 882-QX-4</p>
</div>
</div>
</body></html>
