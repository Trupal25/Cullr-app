<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=Geist+Mono:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#103633",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#313635",
                        "on-tertiary-fixed-variant": "#294d4a",
                        "inverse-surface": "#e0e3e2",
                        "on-primary-container": "#00544d",
                        "on-background": "#e0e3e2",
                        "secondary": "#a8cecb",
                        "on-error": "#690005",
                        "primary-fixed": "#70f8e7",
                        "secondary-fixed": "#c4eae7",
                        "surface-dim": "#101414",
                        "primary-container": "#3ecfbf",
                        "on-surface-variant": "#bbcac6",
                        "on-tertiary-container": "#2c514d",
                        "inverse-on-surface": "#2d3131",
                        "surface-tint": "#4edbcb",
                        "surface-container-lowest": "#0b0f0f",
                        "on-surface": "#e0e3e2",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#a8cec9",
                        "on-primary-fixed": "#00201d",
                        "primary-fixed-dim": "#4edbcb",
                        "outline": "#859490",
                        "background": "#101414",
                        "tertiary-container": "#9cc2be",
                        "on-primary-fixed-variant": "#005049",
                        "secondary-fixed-dim": "#a8cecb",
                        "on-secondary-fixed-variant": "#294d4b",
                        "surface-container": "#1c2020",
                        "surface-container-low": "#181c1c",
                        "on-primary": "#003732",
                        "surface": "#101414",
                        "surface-bright": "#363a3a",
                        "on-secondary-fixed": "#00201f",
                        "on-secondary-container": "#97bcba",
                        "tertiary-fixed": "#c3eae5",
                        "on-secondary": "#103635",
                        "outline-variant": "#3c4947",
                        "error": "#ffb4ab",
                        "surface-container-high": "#272b2b",
                        "primary": "#62ecdb",
                        "tertiary": "#b7ded9",
                        "on-tertiary-fixed": "#00201e",
                        "secondary-container": "#294d4b",
                        "surface-container-highest": "#313635",
                        "inverse-primary": "#006a61",
                        "cullr-red": "#E05C5C",
                        "cullr-red-muted": "rgba(224, 92, 92, 0.1)",
                        "cullr-red-border": "rgba(224, 92, 92, 0.4)"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"],
                        "mono": ["Geist Mono"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .surgical-mask {
            background-color: #080C0C;
            backdrop-filter: blur(8px);
        }
        .sheet-bg {
            background-color: #141D1D;
        }
        .handle-bg {
            background-color: #1E2E2D;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary/30">
<!-- Blurred Background Overlay (The Canvas below the sheet) -->
<div class="fixed inset-0 surgical-mask flex flex-col items-center justify-center z-0">
<!-- Mock Content Behind the Sheet -->
<div class="w-full max-w-md px-6 opacity-20">
<div class="grid grid-cols-3 gap-1">
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred landscape photograph"></div>
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred architectural detail"></div>
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred nature close-up"></div>
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred street scene"></div>
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred portrait"></div>
<div class="aspect-square bg-surface-container-highest" data-alt="Grid item showing a blurred travel photo"></div>
</div>
</div>
</div>
<!-- Main Content Container -->
<div class="fixed inset-0 flex flex-col justify-end z-10">
<!-- Delete Confirmation Bottom Sheet -->
<div class="sheet-bg w-full rounded-t-xl overflow-hidden shadow-2xl flex flex-col items-center pb-12 transition-transform duration-300">
<!-- Top Handle -->
<div class="w-full flex justify-center py-4">
<div class="handle-bg w-[36px] h-[4px] rounded-full"></div>
</div>
<!-- Sheet Content -->
<div class="w-full max-w-md px-8 pt-6 flex flex-col items-center text-center">
<!-- Trash Icon Container -->
<div class="w-[56px] h-[56px] bg-[#1A3F3C] rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-cullr-red text-2xl" data-icon="delete">delete</span>
</div>
<!-- Headline -->
<h2 class="font-headline text-2xl font-semibold text-[#EFF6F5] tracking-tight mb-3">
                    Delete 18 images?
                </h2>
<!-- Body Text -->
<p class="text-[#6B8F8D] text-sm leading-relaxed mb-8 max-w-[280px]">
                    Permanently removes them from your gallery and iCloud. This cannot be undone.
                </p>
<!-- Stat Row -->
<div class="flex gap-3 mb-10">
<div class="bg-[#0E1414] border border-[#1E2E2D] px-3 py-1.5 flex items-center gap-2">
<span class="font-mono text-[10px] uppercase tracking-widest text-[#97bcba]">142 MB freed</span>
</div>
<div class="bg-[#0E1414] border border-[#1E2E2D] px-3 py-1.5 flex items-center gap-2">
<span class="font-mono text-[10px] uppercase tracking-widest text-[#97bcba]">18 files</span>
</div>
</div>
<!-- Action Buttons (Stacked) -->
<div class="w-full flex flex-col gap-3">
<button class="w-full py-4 bg-cullr-red-muted border border-cullr-red-border text-cullr-red font-headline font-semibold tracking-tight hover:bg-cullr-red/20 transition-all active:scale-[0.98]">
                        Delete Permanently
                    </button>
<button class="w-full py-4 text-[#97bcba] font-headline font-medium tracking-tight hover:text-on-background transition-colors active:scale-[0.98]">
                        Cancel
                    </button>
</div>
</div>
</div>
<!-- Surgical Utility Bar (Bottom Docked) -->
<div class="bg-surface-container-high w-full py-2 px-6 flex justify-between items-center border-t border-outline-variant/10">
<span class="font-mono text-[10px] uppercase tracking-widest text-on-secondary-container">System: Awaiting_Confirmation</span>
<span class="font-mono text-[10px] uppercase tracking-widest text-on-secondary-container">Auth: Validated</span>
</div>
</div>
<!-- Top Navigation Anchor (As per Shared Components) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#101414] border-b border-[#313635]/30">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#62ecdb]" data-icon="menu">menu</span>
<h1 class="text-[#62ecdb] font-['Space_Grotesk'] lowercase tracking-tighter text-xl font-bold">cullr</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#97bcba]" data-icon="search">search</span>
</div>
</header>
</body></html>
